name: MeetingTranscriber
options:
  bundleIdPrefix: com.chattrapateanandam
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: YES

targets:
  MeetingTranscriber:
    type: application
    platform: iOS
    sources:
      - path: MeetingTranscriber
    info:
      path: MeetingTranscriber/Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Microphone access is needed to transcribe your meetings in real time."
        UIBackgroundModes:
          - audio
        CFBundleDisplayName: Meeting Transcriber
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chattrapateanandam.meetingtranscriber
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
